name: rem_pass
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  hive_flutter:
  intl: ^0.20.2
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  external_path: ^2.2.0
  file_picker: ^8.0.0
  csv: ^6.0.0
  encrypt:
  url_launcher:
  share_plus:
  crypto: ^3.0.6
  installed_apps: ^2.1.1
  flutter_autofill_service:
    path: ./packages/flutter_autofill_service

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner:
  hive_generator:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/RemPass.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz.ttf
